<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 - Key Trend</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Outfit',sans-serif;background:#0f172a;color:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:480px;width:90%;text-align:center;padding:40px}
.icon{font-size:72px;margin-bottom:24px;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
h1{font-family:'Outfit';font-size:32px;font-weight:800;margin-bottom:12px}
h1 span{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.msg{color:#94a3b8;font-size:16px;line-height:1.8;margin-bottom:36px}
.btn{display:inline-block;background:linear-gradient(135deg,#6366f1,#a855f7);color:white;padding:14px 36px;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px;transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.sub{color:#64748b;font-size:13px;margin-top:24px}
</style>
</head>
<body>
<div class="container">
    <div class="icon">🎉</div>
    <h1><span>결제 완료!</span></h1>
    <p class="msg">
        구독이 활성화되었습니다.<br>
        지금 바로 AI 튜터와 함께 공부를 시작하세요!
    </p>
    <a href="https://keytrend.thinkific.com/courses" class="btn">코스 바로가기 →</a>
    <p class="sub">문의사항이 있으시면 keytrend777@gmail.com으로 연락주세요.</p>
</div>
</body>
</html>
